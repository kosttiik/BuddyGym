syntax = "proto3";

package buddygym.v1;

import "buddygym/v1/checkin.proto";

option go_package = "github.com/kosttiik/BuddyGym/core-service/internal/pb/buddygym/v1;pbv1";

// CoreInternalService is implemented by core-service (Go).
// checkin-service calls it when a checkin reaches a final status.
service CoreInternalService {
  rpc ApplyCheckinResult(ApplyCheckinResultRequest) returns (ApplyCheckinResultResponse);
  rpc GetRoomVerification(GetRoomVerificationRequest) returns (GetRoomVerificationResponse);
}

message ApplyCheckinResultRequest {
  string checkin_id = 1;
  int64 room_id = 2;
  int64 user_id = 3;
  CheckinStatus status = 4;
}

message ApplyCheckinResultResponse {
  int32 workouts_count = 1;
  repeated string granted_achievements = 2;
}

message GetRoomVerificationRequest {
  int64 room_id = 1;
}

message GetRoomVerificationResponse {
  repeated int64 member_ids = 1;
  int32 votes_required = 2;
}
