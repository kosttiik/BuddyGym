syntax = "proto3";

package buddygym.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/kosttiik/BuddyGym/core-service/internal/pb/buddygym/v1;pbv1";

// CheckinService is implemented by checkin-service (Python).
// core-service calls it as a proxy for the frontend.
service CheckinService {
  rpc CreateCheckin(CreateCheckinRequest) returns (CreateCheckinResponse);
  rpc GetCheckin(GetCheckinRequest) returns (GetCheckinResponse);
  rpc ListRoomCheckins(ListRoomCheckinsRequest) returns (ListRoomCheckinsResponse);
  rpc CastVote(CastVoteRequest) returns (CastVoteResponse);
  // photos are never public: core streams them to authorized room members
  rpc GetCheckinPhoto(GetCheckinPhotoRequest) returns (stream CheckinPhotoChunk);
  // core calls this when a room is gone for good
  rpc PurgeRoom(PurgeRoomRequest) returns (PurgeRoomResponse);
  // core calls this when the room's votes_required changes: pending checkins get the new
  // quorum and are re-finalized against the votes they already hold
  rpc SyncRoomVotesRequired(SyncRoomVotesRequiredRequest) returns (SyncRoomVotesRequiredResponse);
}

enum CheckinStatus {
  CHECKIN_STATUS_UNSPECIFIED = 0;
  CHECKIN_STATUS_PENDING = 1;
  CHECKIN_STATUS_APPROVED = 2;
  CHECKIN_STATUS_REJECTED = 3;
  CHECKIN_STATUS_EXPIRED = 4;
}

message GeoPoint {
  double lat = 1;
  double lon = 2;
  double horizontal_accuracy = 3;
}

message Checkin {
  string id = 1;
  int64 room_id = 2;
  int64 user_id = 3;
  CheckinStatus status = 4;
  // object storage key, not a URL: the bucket stays private and core proxies the bytes
  string photo_key = 5;
  GeoPoint geo = 6;
  int32 votes_approve = 7;
  int32 votes_reject = 8;
  int32 votes_required = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp expires_at = 11;
  // photos are retained for a fixed window, then purged by a background job.
  // a shared photo is only purged once every checkin using it has aged out.
  google.protobuf.Timestamp photo_expires_at = 12;
  bool photo_purged = 13;
}

// One room the proof is submitted to. Quorum is per room, so it travels with the target.
message CheckinTarget {
  int64 room_id = 1;
  // decided by core from room settings
  int32 votes_required = 2;
}

// One workout proof, submitted to one or more rooms at once. A photo is uploaded
// once and shared by every checkin created from this request.
message CreateCheckinRequest {
  int64 user_id = 1;
  repeated CheckinTarget targets = 2;
  oneof proof {
    bytes photo = 3;
    GeoPoint geo = 4;
  }
}

message CreateCheckinResponse {
  // one checkin per target, in the same order
  repeated Checkin checkins = 1;
}

message GetCheckinPhotoRequest {
  string checkin_id = 1;
}

message CheckinPhotoChunk {
  bytes data = 1;
  // sniffed on upload, sent on the first chunk only
  string content_type = 2;
}

message GetCheckinRequest {
  string checkin_id = 1;
}

message GetCheckinResponse {
  Checkin checkin = 1;
}

message ListRoomCheckinsRequest {
  int64 room_id = 1;
  // unspecified means all statuses
  CheckinStatus status = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListRoomCheckinsResponse {
  repeated Checkin checkins = 1;
}

message CastVoteRequest {
  string checkin_id = 1;
  int64 voter_id = 2;
  bool approve = 3;
}

message CastVoteResponse {
  Checkin checkin = 1;
}

message PurgeRoomRequest {
  int64 room_id = 1;
}

message PurgeRoomResponse {
  int32 checkins_deleted = 1;
  // a shared photo is kept while any checkin in another room still points at it
  int32 photos_deleted = 2;
}

message SyncRoomVotesRequiredRequest {
  int64 room_id = 1;
  int32 votes_required = 2;
}

message SyncRoomVotesRequiredResponse {
  // pending checkins that got the new quorum
  int32 updated = 1;
  // of those, how many finalized right away
  int32 finalized = 2;
}
