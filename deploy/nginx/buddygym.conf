server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # core caps a checkin photo at 10 MB, leave room for multipart overhead
    client_max_body_size 12m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    server_tokens off;

    # The mini app is rendered inside Telegram's iframe, so X-Frame-Options: DENY would
    # break it. frame-ancestors is the narrow version of the same protection.
    # Avatars come from Telegram's CDN; checkin photos arrive as blob: object URLs.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data: https://t.me https://*.telegram.org https://*.telegram-cdn.org; font-src 'self' data:; connect-src 'self'; frame-ancestors https://web.telegram.org https://*.telegram.org; base-uri 'none'; form-action 'none'; object-src 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /api/ {
        proxy_pass http://core:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        # photo uploads and downloads stream through core, do not buffer them to disk
        proxy_request_buffering off;
    }

    # hashed asset filenames, safe to cache hard
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
