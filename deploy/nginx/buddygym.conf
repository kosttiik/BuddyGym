server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # core caps a checkin photo at 10 MB, leave room for multipart overhead
    client_max_body_size 12m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    server_tokens off;

    # The mini app is rendered inside Telegram's iframe, so X-Frame-Options: DENY would
    # break it. frame-ancestors is the narrow version of the same protection.
    # Avatars: initData hands out https://t.me/i/userpic/... which 302s to *.telesco.pe,
    # and CSP is enforced on the redirect target too, so both hosts must be listed.
    # Checkin photos are fetched with the token and shown as blob: object URLs.
    # wasm-unsafe-eval is for the libheif decoder that opens iPhone HEIC photos; it permits
    # WebAssembly only, not eval(). The decoder runs in a worker, hence worker-src blob:.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data: https://t.me https://*.telesco.pe https://*.telegram.org https://*.cdn-telegram.org; media-src 'self' blob:; font-src 'self' data:; connect-src 'self' blob:; frame-ancestors https://web.telegram.org https://*.telegram.org; base-uri 'none'; form-action 'none'; object-src 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /api/ {
        # nginx resolves an upstream name once at startup, so a restarted core would
        # keep getting traffic on its old container IP. Going through a variable forces
        # a lookup per request against Docker's embedded DNS.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $core_upstream core;
        proxy_pass http://$core_upstream:8080$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        # photo uploads and downloads stream through core, do not buffer them to disk
        proxy_request_buffering off;
    }

    # hashed asset filenames, safe to cache hard
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
