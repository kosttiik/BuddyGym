name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core-service
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: core-service/go.mod
          cache-dependency-path: core-service/go.sum

      - name: vet
        run: go vet ./...

      - name: swagger freshness
        run: |
          go tool swag init -g cmd/core/main.go -o docs --parseInternal
          git diff --exit-code -- docs

      - name: test
        run: go test ./...

      - name: build
        run: go build ./cmd/core

  bot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot-service
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: sync
        run: uv sync --frozen

      - name: lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: test
        run: uv run pytest

      - name: integration test
        run: uv run pytest -m integration

  docker:
    runs-on: ubuntu-latest
    needs: [core, bot]
    steps:
      - uses: actions/checkout@v7
      - name: docker build core
        run: docker build -t buddygym-core ./core-service
      - name: docker build bot
        run: docker build -t buddygym-bot ./bot-service
