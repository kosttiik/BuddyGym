# Production overlay for the Synology NAS.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# DSM owns 80/443 and terminates TLS. It reverse-proxies buddygym.ru to 127.0.0.1:18080,
# which is the only port this stack publishes. Everything else stays on the compose network.
services:
  web:
    build:
      context: ./frontend
      args:
        VITE_BOT_USERNAME: ${VITE_BOT_USERNAME:-buddygym_bot}
        # empty unless the bot serves a named Mini App: a Main App invite is
        # t.me/<bot>?startapp=CODE, while t.me/<bot>/<name> needs a Direct Link
        VITE_MINIAPP_NAME: ${VITE_MINIAPP_NAME-}
    restart: unless-stopped
    volumes:
      - ./deploy/nginx/buddygym.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:${WEB_PORT:-18080}:80"
    depends_on:
      core:
        condition: service_healthy
