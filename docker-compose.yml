services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-buddygym}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buddygym}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-buddygym}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-buddygym-secret}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  core:
    build: ./core-service
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      CORE_HTTP_ADDR: ":8080"
      CORE_GRPC_ADDR: ":9090"
      CORE_DB_DSN: postgres://${POSTGRES_USER:-buddygym}:${POSTGRES_PASSWORD:-buddygym}@postgres:5432/core_db?sslmode=disable
      REDIS_ADDR: redis:6379
      CHECKIN_GRPC_ADDR: checkin:9091
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: ${JWT_TTL:-24h}
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_AVATAR_BUCKET: ${S3_AVATAR_BUCKET:-avatars}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  checkin-migrate:
    build: ./checkin-service
    command: uv run alembic upgrade head
    environment: &checkin_env
      ENVIRONMENT: production
      CHECKIN_GRPC_ADDR: ":9091"
      CHECKIN_DB_DSN: postgres://${POSTGRES_USER:-buddygym}:${POSTGRES_PASSWORD:-buddygym}@postgres:5432/checkin_db?sslmode=disable
      CORE_GRPC_ADDR: core:9090
      CORE_GRPC_TIMEOUT_SECONDS: 5
      CORE_GRPC_RETRIES: 3
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-buddygym}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-buddygym-secret}
      S3_BUCKET: ${S3_BUCKET:-checkin-photos}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  checkin:
    build: ./checkin-service
    restart: unless-stopped
    environment: *checkin_env
    depends_on:
      checkin-migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:9091"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  checkin-worker:
    build: ./checkin-service
    restart: unless-stopped
    command: uv run celery -A src.core.celery.celery_app worker --loglevel=info
    environment: *checkin_env
    depends_on:
      checkin-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      core:
        condition: service_healthy

  checkin-beat:
    build: ./checkin-service
    restart: unless-stopped
    command: uv run celery -A src.core.celery.celery_app beat --loglevel=info
    environment: *checkin_env
    depends_on:
      checkin-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
