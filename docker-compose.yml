services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-buddygym}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buddygym}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-buddygym}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-buddygym-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  core:
    build: ./core-service
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      CORE_HTTP_ADDR: ":8080"
      CORE_GRPC_ADDR: ":9090"
      CORE_DB_DSN: postgres://${POSTGRES_USER:-buddygym}:${POSTGRES_PASSWORD:-buddygym}@postgres:5432/core_db?sslmode=disable
      REDIS_ADDR: redis:6379
      CHECKIN_GRPC_ADDR: checkin:9091
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: ${JWT_TTL:-24h}
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # uncomment when checkin-service lands
  # checkin:
  #   build: ./checkin-service
  #   environment:
  #     CHECKIN_GRPC_ADDR: ":9091"
  #     CHECKIN_DB_DSN: postgres://${POSTGRES_USER:-buddygym}:${POSTGRES_PASSWORD:-buddygym}@postgres:5432/checkin_db?sslmode=disable
  #     CORE_GRPC_ADDR: core:9090
  #     S3_ENDPOINT: minio:9000
  #     S3_ACCESS_KEY: ${MINIO_ROOT_USER:-buddygym}
  #     S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-buddygym-secret}
  #     S3_BUCKET: checkin-photos
  #   ports:
  #     - "9091:9091"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     minio:
  #       condition: service_healthy

volumes:
  pgdata:
  miniodata:
