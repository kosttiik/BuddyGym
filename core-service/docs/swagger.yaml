            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Join a room by invite code
      tags:
      - rooms
  /rooms/open:
    get:
      description: Rooms anyone can join, excluding the ones the user is already in.
        Invite codes are not returned.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Room'
            type: array
        "401":
          description: Unauthorized
