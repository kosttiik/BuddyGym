basePath: /api/v1
definitions:
  checkin.Checkin:
    properties:
      buddies:
        items:
          $ref: '#/definitions/domain.User'
        type: array
      comments_count:
        type: integer
      created_at:
        type: string
      expires_at:
        type: string
      geo:
        $ref: '#/definitions/checkin.Geo'
      has_photo:
        type: boolean
      id:
        type: string
      photo_expires_at:
        type: string
      photo_purged:
        type: boolean
      room_id:
        type: integer
      status:
        enum:
        - pending
        - approved
        - rejected
        - expired
        type: string
      top_comment:
        $ref: '#/definitions/domain.Comment'
      user_id:
        type: integer
      votes_approve:
        type: integer
      votes_reject:
        type: integer
      votes_required:
        type: integer
    type: object
  checkin.Geo:
    properties:
      horizontal_accuracy:
        type: number
      lat:
        type: number
      lon:
        type: number
    type: object
  domain.AchievementProgress:
    properties:
      current:
        type: integer
      granted_at:
        type: string
      key:
        type: string
      target:
        type: integer
    type: object
  domain.Comment:
    properties:
      author:
        $ref: '#/definitions/domain.User'
      body:
        type: string
      checkin_id:
        type: string
      created_at:
        type: string
      has_photo:
        type: boolean
      id:
        type: integer
      liked_by_me:
        type: boolean
      likes:
        type: integer
      user_id:
        type: integer
    type: object
  domain.Freeze:
    properties:
      canceled_at:
        type: string
      created_at:
        type: string
      ends_at:
        type: string
      id:
        type: integer
      room_id:
        type: integer
      starts_at:
        type: string
      user_id:
        type: integer
    type: object
  domain.Member:
    properties:
      created_at:
        type: string
      effective_goal:
        type: integer
      first_name:
        type: string
      freeze:
        $ref: '#/definitions/domain.Freeze'
      freeze_cooldown_until:
        type: string
      goal_per_period:
        type: integer
      has_avatar:
        type: boolean
      has_closed_period:
        type: boolean
      id:
        type: integer
      joined_at:
        type: string
      last_closed_period_failed:
        type: boolean
      period_ends_at:
        type: string
      photo_url:
        type: string
      rank:
        type: string
      sport_emoji:
        type: string
      sport_name:
        type: string
      status_emoji:
        type: string
      status_text:
        type: string
      streak:
        type: integer
      theme:
        type: string
      username:
        type: string
      workouts_count:
        type: integer
    type: object
  domain.Room:
    properties:
      created_at:
        type: string
      creator_id:
        type: integer
      goal_per_period:
        type: integer
      has_avatar:
        type: boolean
      id:
        type: integer
      invite_code:
        type: string
      kind:
        type: string
      name:
        type: string
      period_days:
        type: integer
      votes_required:
        type: integer
    type: object
  domain.RoomAvatar:
    properties:
      created_at:
        type: string
      id:
        type: integer
      is_current:
        type: boolean
      uploaded_by:
        type: integer
    type: object
  domain.RoomWithProgress:
    properties:
      created_at:
        type: string
      creator_id:
        type: integer
      goal_per_period:
        type: integer
      has_avatar:
        type: boolean
      id:
        type: integer
      invite_code:
        type: string
      kind:
        type: string
      members_count:
        type: integer
      my_goal:
        type: integer
      name:
        type: string
      period_days:
        type: integer
      period_ends_at:
        type: string
      streak:
        type: integer
      votes_required:
        type: integer
      workouts_count:
        type: integer
    type: object
  domain.Stats:
    properties:
      best_streak:
        type: integer
      buddies:
        type: integer
      comments:
        type: integer
      early_workouts:
        type: integer
      late_workouts:
        type: integer
      rooms:
        type: integer
      total_workouts:
        type: integer
    type: object
  domain.User:
    properties:
      created_at:
        type: string
      first_name:
        type: string
      has_avatar:
        type: boolean
      id:
        type: integer
      photo_url:
        type: string
      rank:
        type: string
      status_emoji:
        type: string
      status_text:
        type: string
      theme:
        type: string
      username:
        type: string
    type: object
  httpapi.AuthTelegramRequest:
    properties:
      init_data:
        example: query_id=...&user=...&auth_date=...&hash=...
        type: string
    type: object
  httpapi.AuthTelegramResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/domain.User'
    type: object
  httpapi.BuddiesRequest:
    properties:
      user_ids:
        items:
          type: integer
        type: array
    type: object
  httpapi.CommentRequest:
    properties:
      body:
        example: Красавчик
        type: string
    type: object
  httpapi.CreateCheckinGeoRequest:
    properties:
      buddy_ids:
        items:
          type: integer
        type: array
      geo:
        $ref: '#/definitions/checkin.Geo'
      room_ids:
        items:
          type: integer
        type: array
    type: object
  httpapi.CreateRoomRequest:
    properties:
      goal_per_period:
        example: 3
        maximum: 100
        minimum: 1
        type: integer
      kind:
        enum:
        - open
        - invite
        example: open
        type: string
      name:
        example: Iron buddies
        type: string
      period_days:
        example: 7
        maximum: 90
        minimum: 1
        type: integer
      votes_required:
        example: 2
        maximum: 20
        minimum: 1
        type: integer
    type: object
  httpapi.ErrorResponse:
    properties:
      error:
        example: room not found
        type: string
    type: object
  httpapi.FreezeRequest:
    properties:
      ends_at:
        example: "2026-08-05"
        type: string
      starts_at:
        example: "2026-07-25"
        type: string
    type: object
  httpapi.HealthResponse:
    properties:
      postgres:
        example: ok
        type: string
      redis:
        example: ok
        type: string
      status:
        enum:
        - ok
        - degraded
        example: ok
        type: string
    type: object
  httpapi.JoinByCodeRequest:
    properties:
      invite_code:
        example: 7HKPQ2XW
        type: string
    type: object
  httpapi.MeResponse:
    properties:
      achievements:
        items:
          $ref: '#/definitions/domain.AchievementProgress'
        type: array
      best_streak:
        type: integer
      stats:
        $ref: '#/definitions/domain.Stats'
      user:
        $ref: '#/definitions/domain.User'
    type: object
  httpapi.RoomDetailResponse:
    properties:
      members:
        items:
          $ref: '#/definitions/domain.Member'
        type: array
      room:
        $ref: '#/definitions/domain.Room'
    type: object
  httpapi.UpdateMeRequest:
    properties:
      status_emoji:
        type: string
      status_text:
        example: На массе
        type: string
      theme:
        enum:
        - default
        - dark
        - neon
        example: dark
        type: string
    type: object
  httpapi.UpdateMembershipRequest:
    properties:
      goal_per_period:
        example: 2
        maximum: 100
        minimum: 1
        type: integer
      sport_emoji:
        example: "\U0001F9D7"
        type: string
      sport_name:
        example: climbing
        type: string
    type: object
  httpapi.UpdateRoomRequest:
    properties:
      goal_per_period:
        example: 3
        maximum: 100
        minimum: 1
        type: integer
      kind:
        enum:
        - open
        - invite
        example: open
        type: string
      name:
        example: Iron buddies
        type: string
      period_days:
        example: 7
        maximum: 90
        minimum: 1
        type: integer
      votes_required:
        example: 2
        maximum: 20
        minimum: 1
        type: integer
    type: object
  httpapi.UserProfileResponse:
    properties:
      achievements:
        items:
          $ref: '#/definitions/domain.AchievementProgress'
        type: array
      best_streak:
        type: integer
      stats:
        $ref: '#/definitions/domain.Stats'
      user:
        $ref: '#/definitions/domain.User'
    type: object
  httpapi.VoteRequest:
    properties:
      approve:
        example: true
        type: boolean
    type: object
info:
  contact: {}
  description: 'Core service of BuddyGym: auth, users, rooms, rewards, checkin proxy.'
  title: BuddyGym Core API
  version: "1.0"
paths:
  /auth/telegram:
    post:
      consumes:
      - application/json
      description: Validates Mini App initData signature, upserts the user and issues
        a Bearer token for all other endpoints.
      parameters:
      - description: raw initData string
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.AuthTelegramRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.AuthTelegramResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      summary: Exchange Telegram initData for a JWT
      tags:
      - auth
  /checkins:
    post:
      consumes:
      - multipart/form-data
      - application/json
      description: Submits one workout proof to every listed room. A photo is uploaded
        once and shared by all of them, so posting to several rooms never stores it
        twice. Send multipart/form-data with a "photo" file (up to 10 MB) and repeated
        "room_ids" fields, or JSON with a geo point and room_ids for the fast path.
        The caller must be a member of every room.
      parameters:
      - description: workout photo
        in: formData
        name: photo
        type: file
      - collectionFormat: csv
        description: rooms to submit to
        in: formData
        items:
          type: integer
        name: room_ids
        type: array
      - collectionFormat: csv
        description: members who trained with you
        in: formData
        items:
          type: integer
        name: buddy_ids
        type: array
      - description: geo proof (json variant)
        in: body
        name: body
        schema:
          $ref: '#/definitions/httpapi.CreateCheckinGeoRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            items:
              $ref: '#/definitions/checkin.Checkin'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a checkin in one or more rooms
      tags:
      - checkins
  /checkins/{id}/buddies:
    post:
      consumes:
      - application/json
      description: Adds buddies to a checkin that is still being voted on. Only the
        author can tag, and buddies who are not members of the checkin room are ignored.
        The workout is credited to them once the room approves the checkin, so a rejected
        photo hands out nothing.
      parameters:
      - description: checkin id
        in: path
        name: id
        required: true
        type: string
      - description: tagged user ids
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.BuddiesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.User'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Tag people who trained with you
      tags:
      - checkins
  /checkins/{id}/buddies/{userId}:
    delete:
      description: 'Untags a buddy from a checkin. Only the author can untag, and
        only while the checkin is still pending: once it is approved the workout is
        already theirs.'
      parameters:
      - description: checkin id
        in: path
        name: id
        required: true
        type: string
      - description: tagged user id
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.User'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove a tagged buddy
      tags:
      - checkins
  /checkins/{id}/comments:
    get:
      parameters:
      - description: checkin id
        in: path
        name: id
        required: true
        type: string
      - description: page size, default 50, max 100
        in: query
        name: limit
        type: integer
      - description: page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Comment'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List comments on a checkin
      tags:
      - checkins
    post:
      consumes:
      - application/json
      - multipart/form-data
      description: Room members only. Send JSON with a body, or multipart/form-data
        with a "body" field and an optional "photo" file up to 5 MB. Either the text
        or the photo must be there.
      parameters:
      - description: checkin id
        in: path
        name: id
        required: true
        type: string
      - description: comment (json variant)
        in: body
        name: body
        schema:
          $ref: '#/definitions/httpapi.CommentRequest'
      - description: attached image
        in: formData
        name: photo
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Comment'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Comment on a checkin
      tags:
      - checkins
  /checkins/{id}/comments/{commentId}:
    delete:
      description: The author can delete their own comment; the room creator can delete
        any.
      parameters:
      - description: checkin id
        in: path
        name: id
        required: true
        type: string
      - description: comment id
        in: path
        name: commentId
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a comment
      tags:
      - checkins
  /checkins/{id}/comments/{commentId}/like:
    delete:
      parameters:
      - description: checkin id
        in: path
        name: id
        required: true
        type: string
      - description: comment id
        in: path
        name: commentId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Comment'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove a like from a comment
      tags:
      - checkins
    post:
      description: 'Idempotent: liking twice leaves one like.'
      parameters:
      - description: checkin id
        in: path
        name: id
        required: true
        type: string
      - description: comment id
        in: path
        name: commentId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Comment'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Like a comment
      tags:
      - checkins
  /checkins/{id}/comments/{commentId}/photo:
    get:
      description: Room members only. The bucket is private and the bytes are proxied
        by core, so browsers must fetch this with XHR rather than a plain <img src>.
      parameters:
      - description: checkin id
        in: path
        name: id
        required: true
        type: string
      - description: comment id
        in: path
        name: commentId
        required: true
        type: integer
      produces:
      - image/jpeg
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Download a photo attached to a comment
      tags:
      - checkins
  /checkins/{id}/photo:
    get:
      description: 'Streams the proof photo. The object storage bucket is private:
        only members of the room the checkin belongs to can read it, and the bytes
        are proxied through core-service. Requires a Bearer token, so browsers must
        fetch it via XHR rather than a plain <img src>.'
      parameters:
      - description: checkin id
        in: path
        name: id
        required: true
        type: string
      produces:
      - image/jpeg
      - image/png
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Download a checkin photo
      tags:
      - checkins
  /checkins/{id}/vote:
    post:
      consumes:
      - application/json
      description: Approves or rejects a peer checkin. Only members of the checkin
        room can vote; voting for your own checkin is forbidden.
      parameters:
      - description: checkin id
        in: path
        name: id
        required: true
        type: string
      - description: vote
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.VoteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/checkin.Checkin'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Vote on a checkin
      tags:
      - checkins
  /health:
    get:
      description: Reports core-service health including Postgres and Redis connectivity.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.HealthResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/httpapi.HealthResponse'
      summary: Service health
      tags:
      - system
  /me:
    get:
      description: Returns the authenticated user profile with achievements.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.MeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get my profile
      tags:
      - me
    patch:
      consumes:
      - application/json
      description: Changes the theme and the status line. Every field is optional;
        only the ones present are written. Empty strings clear the status. The rank
        is derived from workouts and cannot be set.
      parameters:
      - description: fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.UpdateMeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
