basePath: /api/v1
definitions:
  checkin.Checkin:
    properties:
      buddies:
        description: filled in by core, not checkin-service
        items:
          $ref: '#/definitions/domain.User'
        type: array
      comments_count:
        type: integer
      created_at:
        type: string
      expires_at:
        type: string
      geo:
        $ref: '#/definitions/checkin.Geo'
      has_photo:
        description: the storage key never leaves core; clients fetch bytes from /checkins/{id}/photo
        type: boolean
      id:
        type: string
      photo_expires_at:
        type: string
      photo_purged:
        description: photos are purged after a retention window; once purged the bytes
          are gone for good
        type: boolean
      room_id:
        type: integer
      status:
        enum:
        - pending
        - approved
        - rejected
        - expired
        type: string
      user_id:
        type: integer
      votes_approve:
        type: integer
      votes_reject:
        type: integer
      votes_required:
        type: integer
    type: object
  checkin.Geo:
    properties:
      lat:
        type: number
      lon:
        type: number
    type: object
  domain.Achievement:
    properties:
      granted_at:
        type: string
      key:
        type: string
    type: object
  domain.Comment:
    properties:
      author:
        $ref: '#/definitions/domain.User'
      body:
        type: string
      checkin_id:
        type: string
      created_at:
        type: string
      id:
        type: integer
      user_id:
        type: integer
    type: object
  domain.Member:
    properties:
      created_at:
        type: string
      first_name:
        type: string
      has_avatar:
        description: clients read the bytes from GET /users/{id}/avatar, never from
          object storage directly
        type: boolean
      id:
        type: integer
      joined_at:
        type: string
      period_ends_at:
        type: string
      photo_url:
        description: the telegram URL, unreachable for our users. Kept as the mirror
          change signal, not for display.
        type: string
      rank:
        description: derived from the workout total, not settable
        type: string
      status_emoji:
        description: 'what the member writes about themselves: a single emoji plus
          a short line'
        type: string
      status_text:
        type: string
      streak:
        type: integer
      theme:
        type: string
      username:
        type: string
      workouts_count:
        type: integer
    type: object
  domain.Room:
    properties:
      created_at:
        type: string
      creator_id:
        type: integer
      goal_per_period:
        type: integer
      id:
        type: integer
      invite_code:
        type: string
      kind:
        type: string
      name:
        type: string
      period_days:
        type: integer
      votes_required:
        type: integer
    type: object
  domain.RoomWithProgress:
    properties:
      created_at:
        type: string
      creator_id:
        type: integer
      goal_per_period:
        type: integer
      id:
        type: integer
      invite_code:
        type: string
      kind:
        type: string
      members_count:
        type: integer
      name:
        type: string
      period_days:
        type: integer
      period_ends_at:
        description: when the current period closes and the streak burns unless the
          goal is met
        type: string
      streak:
        type: integer
      votes_required:
        type: integer
      workouts_count:
        type: integer
    type: object
  domain.User:
    properties:
      created_at:
        type: string
      first_name:
        type: string
      has_avatar:
        description: clients read the bytes from GET /users/{id}/avatar, never from
          object storage directly
        type: boolean
      id:
        type: integer
      photo_url:
        description: the telegram URL, unreachable for our users. Kept as the mirror
          change signal, not for display.
        type: string
      rank:
        description: derived from the workout total, not settable
        type: string
      status_emoji:
        description: 'what the member writes about themselves: a single emoji plus
          a short line'
        type: string
      status_text:
        type: string
      theme:
        type: string
      username:
        type: string
    type: object
  httpapi.AuthTelegramRequest:
    properties:
      init_data:
        example: query_id=...&user=...&auth_date=...&hash=...
        type: string
    type: object
  httpapi.AuthTelegramResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/domain.User'
    type: object
  httpapi.BuddiesRequest:
    properties:
      user_ids:
        items:
          type: integer
        type: array
    type: object
  httpapi.CommentRequest:
    properties:
      body:
        example: Красавчик
        type: string
    type: object
  httpapi.CreateCheckinGeoRequest:
    properties:
      buddy_ids:
        items:
          type: integer
        type: array
      geo:
        $ref: '#/definitions/checkin.Geo'
      room_ids:
        items:
          type: integer
        type: array
    type: object
  httpapi.CreateRoomRequest:
    properties:
      goal_per_period:
        example: 3
        maximum: 100
        minimum: 1
        type: integer
      kind:
        enum:
        - open
        - invite
        example: open
        type: string
      name:
        example: Iron buddies
        type: string
      period_days:
        example: 7
        maximum: 90
        minimum: 1
        type: integer
      votes_required:
        example: 2
        maximum: 20
        minimum: 1
        type: integer
    type: object
  httpapi.ErrorResponse:
    properties:
      error:
        example: room not found
        type: string
    type: object
  httpapi.HealthResponse:
    properties:
      postgres:
        example: ok
        type: string
      redis:
        example: ok
        type: string
      status:
        enum:
        - ok
        - degraded
        example: ok
        type: string
    type: object
  httpapi.JoinByCodeRequest:
    properties:
      invite_code:
        example: 7HKPQ2XW
        type: string
    type: object
  httpapi.MeResponse:
    properties:
      achievements:
        items:
          $ref: '#/definitions/domain.Achievement'
        type: array
      best_streak:
        description: highest streak across the user rooms
        type: integer
      user:
        $ref: '#/definitions/domain.User'
    type: object
  httpapi.RoomDetailResponse:
    properties:
      members:
        items:
          $ref: '#/definitions/domain.Member'
        type: array
      room:
        $ref: '#/definitions/domain.Room'
    type: object
  httpapi.UpdateMeRequest:
    properties:
      status_emoji:
        type: string
      status_text:
        example: На массе
        type: string
      theme:
        enum:
        - default
        - dark
        - neon
        example: dark
        type: string
    type: object
  httpapi.UpdateRoomRequest:
    properties:
      goal_per_period:
        example: 3
        maximum: 100
        minimum: 1
        type: integer
      kind:
        enum:
        - open
        - invite
        example: open
        type: string
      name:
        example: Iron buddies
        type: string
      period_days:
        example: 7
        maximum: 90
        minimum: 1
        type: integer
      votes_required:
        example: 2
        maximum: 20
        minimum: 1
        type: integer
    type: object
  httpapi.UserProfileResponse:
    properties:
      achievements:
        items:
          $ref: '#/definitions/domain.Achievement'
        type: array
      best_streak:
        type: integer
      user:
        $ref: '#/definitions/domain.User'
    type: object
  httpapi.VoteRequest:
    properties:
      approve:
        example: true
        type: boolean
    type: object
info:
  contact: {}
  description: 'Core service of BuddyGym: auth, users, rooms, rewards, checkin proxy.'
  title: BuddyGym Core API
  version: "1.0"
paths:
  /auth/telegram:
    post:
      consumes:
      - application/json
      description: Validates Mini App initData signature, upserts the user and issues
        a Bearer token for all other endpoints.
      parameters:
      - description: raw initData string
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.AuthTelegramRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.AuthTelegramResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      summary: Exchange Telegram initData for a JWT
      tags:
      - auth
  /checkins:
    post:
      consumes:
      - multipart/form-data
      - application/json
      description: Submits one workout proof to every listed room. A photo is uploaded
        once and shared by all of them, so posting to several rooms never stores it
        twice. Send multipart/form-data with a "photo" file (up to 10 MB) and repeated
        "room_ids" fields, or JSON with a geo point and room_ids for the fast path.
        The caller must be a member of every room.
      parameters:
      - description: workout photo
        in: formData
        name: photo
        type: file
      - collectionFormat: csv
        description: rooms to submit to
        in: formData
        items:
          type: integer
        name: room_ids
        type: array
      - collectionFormat: csv
        description: members who trained with you
        in: formData
        items:
          type: integer
        name: buddy_ids
        type: array
      - description: geo proof (json variant)
        in: body
        name: body
        schema:
          $ref: '#/definitions/httpapi.CreateCheckinGeoRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            items:
              $ref: '#/definitions/checkin.Checkin'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a checkin in one or more rooms
      tags:
      - checkins
  /checkins/{id}/buddies:
    post:
      consumes:
      - application/json
      description: Adds buddies to a checkin that is still being voted on. Only the
        author can tag, and buddies who are not members of the checkin room are ignored.
        The workout is credited to them once the room approves the checkin, so a rejected
        photo hands out nothing.
      parameters:
      - description: checkin id
        in: path
        name: id
        required: true
        type: string
      - description: tagged user ids
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.BuddiesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.User'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Tag people who trained with you
      tags:
      - checkins
  /checkins/{id}/buddies/{userId}:
    delete:
      description: 'Untags a buddy from a checkin. Only the author can untag, and
        only while the checkin is still pending: once it is approved the workout is
        already theirs.'
      parameters:
      - description: checkin id
        in: path
        name: id
        required: true
        type: string
      - description: tagged user id
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.User'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove a tagged buddy
      tags:
      - checkins
  /checkins/{id}/comments:
    get:
      parameters:
      - description: checkin id
        in: path
        name: id
        required: true
        type: string
      - description: page size, default 50, max 100
        in: query
        name: limit
        type: integer
      - description: page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Comment'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List comments on a checkin
      tags:
      - checkins
    post:
      consumes:
      - application/json
      description: Room members only. The body is trimmed and must be 1..500 characters.
      parameters:
      - description: checkin id
        in: path
        name: id
        required: true
        type: string
      - description: comment
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.CommentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Comment'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Comment on a checkin
      tags:
      - checkins
  /checkins/{id}/comments/{commentId}:
    delete:
      description: The author can delete their own comment; the room creator can delete
        any.
      parameters:
      - description: checkin id
        in: path
        name: id
        required: true
        type: string
      - description: comment id
        in: path
        name: commentId
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a comment
      tags:
      - checkins
  /checkins/{id}/photo:
    get:
      description: 'Streams the proof photo. The object storage bucket is private:
        only members of the room the checkin belongs to can read it, and the bytes
        are proxied through core-service. Requires a Bearer token, so browsers must
        fetch it via XHR rather than a plain <img src>.'
      parameters:
      - description: checkin id
        in: path
        name: id
        required: true
        type: string
      produces:
      - image/jpeg
      - image/png
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Download a checkin photo
      tags:
      - checkins
  /checkins/{id}/vote:
    post:
      consumes:
      - application/json
      description: Approves or rejects a peer checkin. Only members of the checkin
        room can vote; voting for your own checkin is forbidden.
      parameters:
      - description: checkin id
        in: path
        name: id
        required: true
        type: string
      - description: vote
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.VoteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/checkin.Checkin'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Vote on a checkin
      tags:
      - checkins
  /health:
    get:
      description: Reports core-service health including Postgres and Redis connectivity.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.HealthResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/httpapi.HealthResponse'
      summary: Service health
      tags:
      - system
  /me:
    get:
      description: Returns the authenticated user profile with achievements.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.MeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get my profile
      tags:
      - me
    patch:
      consumes:
      - application/json
      description: Changes the theme and the status line. Every field is optional;
        only the ones present are written. Empty strings clear the status. The rank
        is derived from workouts and cannot be set.
      parameters:
      - description: fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.UpdateMeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update my profile
      tags:
      - me
  /rooms:
    get:
      description: Rooms the user belongs to, with the current period workout counter.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.RoomWithProgress'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List my rooms
      tags:
      - rooms
    post:
      consumes:
      - application/json
      description: Creates a room and enrolls the creator. Returns the room with its
        invite code.
      parameters:
      - description: room settings
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.CreateRoomRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Room'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a room
      tags:
      - rooms
  /rooms/{id}:
    delete:
      description: Deletes a room and its memberships. Only the creator may do this.
      parameters:
      - description: room id
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a room
      tags:
      - rooms
    get:
      description: Room with members. Invite-only rooms are visible to members only;
        the invite code is hidden from non-members.
      parameters:
      - description: room id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.RoomDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get room details
      tags:
      - rooms
    patch:
      consumes:
      - application/json
      description: Updates room settings. Only the creator may do this.
      parameters:
      - description: room id
        in: path
        name: id
        required: true
        type: integer
      - description: room settings
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.UpdateRoomRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
