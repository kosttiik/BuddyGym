        in: path
        name: id
        required: true
        type: integer
      - description: filter by status
        enum:
        - pending
        - approved
        - rejected
        - expired
        in: query
        name: status
        type: string
      - description: page size, default 20, max 100
        in: query
        name: limit
        type: integer
      - description: page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
