      tags:
      - rooms
  /rooms/join:
    post:
      consumes:
      - application/json
      description: Joins any room using its invite code. Idempotent.
      parameters:
      - description: invite code
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.JoinByCodeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
