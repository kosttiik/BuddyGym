basePath: /api/v1
definitions:
  checkin.Checkin:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      geo:
        $ref: '#/definitions/checkin.Geo'
      has_photo:
        description: the storage key never leaves core; clients fetch bytes from /checkins/{id}/photo
        type: boolean
      id:
        type: string
      photo_expires_at:
        type: string
      photo_purged:
        description: photos are purged after a retention window; once purged the bytes
          are gone for good
        type: boolean
      room_id:
        type: integer
      status:
        enum:
        - pending
        - approved
        - rejected
        - expired
        type: string
      user_id:
        type: integer
      votes_approve:
        type: integer
      votes_reject:
        type: integer
      votes_required:
        type: integer
    type: object
  checkin.Geo:
    properties:
      lat:
        type: number
      lon:
        type: number
    type: object
  domain.Achievement:
    properties:
      granted_at:
        type: string
      key:
        type: string
    type: object
  domain.Member:
    properties:
      created_at:
        type: string
      first_name:
        type: string
      id:
        type: integer
      joined_at:
        type: string
      photo_url:
        type: string
      status:
        type: string
      theme:
        type: string
      username:
        type: string
      workouts_count:
        type: integer
    type: object
  domain.Room:
    properties:
      created_at:
        type: string
      creator_id:
        type: integer
      goal_per_period:
        type: integer
      id:
        type: integer
      invite_code:
        type: string
      kind:
        type: string
      name:
        type: string
      period_days:
        type: integer
      votes_required:
        type: integer
    type: object
  domain.RoomWithProgress:
    properties:
      created_at:
        type: string
      creator_id:
        type: integer
      goal_per_period:
        type: integer
      id:
        type: integer
      invite_code:
        type: string
      kind:
        type: string
      members_count:
        type: integer
      name:
        type: string
      period_days:
        type: integer
      votes_required:
        type: integer
      workouts_count:
        type: integer
    type: object
  domain.User:
    properties:
      created_at:
        type: string
      first_name:
        type: string
      id:
        type: integer
      photo_url:
        type: string
      status:
        type: string
      theme:
        type: string
      username:
        type: string
    type: object
  httpapi.AuthTelegramRequest:
    properties:
      init_data:
        example: query_id=...&user=...&auth_date=...&hash=...
        type: string
    type: object
  httpapi.AuthTelegramResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/domain.User'
    type: object
  httpapi.CreateCheckinGeoRequest:
    properties:
      geo:
        $ref: '#/definitions/checkin.Geo'
      room_ids:
        items:
          type: integer
        type: array
    type: object
  httpapi.CreateRoomRequest:
    properties:
      goal_per_period:
        example: 3
        maximum: 100
        minimum: 1
        type: integer
      kind:
        enum:
        - open
        - invite
        example: open
        type: string
      name:
        example: Iron buddies
        type: string
      period_days:
        example: 7
        maximum: 90
        minimum: 1
        type: integer
      votes_required:
        example: 2
        maximum: 20
        minimum: 1
        type: integer
    type: object
  httpapi.ErrorResponse:
    properties:
      error:
        example: room not found
        type: string
    type: object
  httpapi.HealthResponse:
    properties:
      postgres:
        example: ok
        type: string
      redis:
        example: ok
        type: string
      status:
        enum:
        - ok
        - degraded
        example: ok
        type: string
    type: object
  httpapi.JoinByCodeRequest:
    properties:
      invite_code:
        example: 7HKPQ2XW
        type: string
    type: object
  httpapi.MeResponse:
    properties:
      achievements:
        items:
          $ref: '#/definitions/domain.Achievement'
        type: array
      user:
        $ref: '#/definitions/domain.User'
    type: object
  httpapi.RoomDetailResponse:
    properties:
      members:
        items:
          $ref: '#/definitions/domain.Member'
        type: array
      room:
        $ref: '#/definitions/domain.Room'
    type: object
  httpapi.UpdateMeRequest:
    properties:
      theme:
        enum:
        - default
        - dark
        - neon
        example: dark
        type: string
    type: object
  httpapi.UserProfileResponse:
    properties:
      achievements:
        items:
          $ref: '#/definitions/domain.Achievement'
        type: array
      user:
        $ref: '#/definitions/domain.User'
    type: object
  httpapi.VoteRequest:
    properties:
      approve:
        example: true
        type: boolean
    type: object
info:
  contact: {}
  description: 'Core service of BuddyGym: auth, users, rooms, rewards, checkin proxy.'
  title: BuddyGym Core API
  version: "1.0"
paths:
  /auth/telegram:
    post:
      consumes:
      - application/json
      description: Validates Mini App initData signature, upserts the user and issues
        a Bearer token for all other endpoints.
      parameters:
      - description: raw initData string
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.AuthTelegramRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.AuthTelegramResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      summary: Exchange Telegram initData for a JWT
      tags:
      - auth
  /checkins:
    post:
      consumes:
      - multipart/form-data
      - application/json
      description: Submits one workout proof to every listed room. A photo is uploaded
        once and shared by all of them, so posting to several rooms never stores it
        twice. Send multipart/form-data with a "photo" file (up to 10 MB) and repeated
        "room_ids" fields, or JSON with a geo point and room_ids for the fast path.
        The caller must be a member of every room.
      parameters:
      - description: workout photo
        in: formData
        name: photo
        type: file
      - collectionFormat: csv
        description: rooms to submit to
        in: formData
        items:
          type: integer
        name: room_ids
        type: array
      - description: geo proof (json variant)
        in: body
        name: body
        schema:
          $ref: '#/definitions/httpapi.CreateCheckinGeoRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            items:
              $ref: '#/definitions/checkin.Checkin'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a checkin in one or more rooms
      tags:
      - checkins
  /checkins/{id}/photo:
    get:
      description: 'Streams the proof photo. The object storage bucket is private:
        only members of the room the checkin belongs to can read it, and the bytes
        are proxied through core-service. Requires a Bearer token, so browsers must
        fetch it via XHR rather than a plain <img src>.'
      parameters:
      - description: checkin id
        in: path
        name: id
        required: true
        type: string
      produces:
      - image/jpeg
      - image/png
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Download a checkin photo
      tags:
      - checkins
  /checkins/{id}/vote:
    post:
      consumes:
      - application/json
      description: Approves or rejects a peer checkin. Only members of the checkin
        room can vote; voting for your own checkin is forbidden.
      parameters:
      - description: checkin id
        in: path
        name: id
        required: true
        type: string
      - description: vote
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.VoteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/checkin.Checkin'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Vote on a checkin
      tags:
      - checkins
  /health:
    get:
      description: Reports core-service health including Postgres and Redis connectivity.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.HealthResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/httpapi.HealthResponse'
      summary: Service health
      tags:
      - system
  /me:
    get:
      description: Returns the authenticated user profile with achievements.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.MeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get my profile
      tags:
      - me
    patch:
      consumes:
      - application/json
      description: Changes the profile theme. Status is derived from workouts and
        cannot be set.
      parameters:
      - description: fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.UpdateMeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update my profile
      tags:
      - me
  /rooms:
    get:
      description: Rooms the user belongs to, with the current period workout counter.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.RoomWithProgress'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List my rooms
      tags:
      - rooms
    post:
      consumes:
      - application/json
      description: Creates a room and enrolls the creator. Returns the room with its
        invite code.
      parameters:
      - description: room settings
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.CreateRoomRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Room'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a room
      tags:
      - rooms
  /rooms/{id}:
    get:
      description: Room with members. Invite-only rooms are visible to members only;
        the invite code is hidden from non-members.
      parameters:
      - description: room id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.RoomDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get room details
      tags:
      - rooms
  /rooms/{id}/checkins:
    get:
      parameters:
      - description: room id
        in: path
        name: id
        required: true
        type: integer
      - description: filter by status
        enum:
        - pending
        - approved
        - rejected
        - expired
        in: query
        name: status
        type: string
      - description: page size, default 20, max 100
        in: query
        name: limit
        type: integer
      - description: page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/checkin.Checkin'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List room checkins
      tags:
      - checkins
  /rooms/{id}/join:
    post:
      description: Joins an open room by id. Invite-only rooms require POST /rooms/join
        with a code. Idempotent.
      parameters:
      - description: room id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Room'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Join an open room
      tags:
      - rooms
  /rooms/{id}/leave:
    post:
      parameters:
      - description: room id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Leave a room
      tags:
      - rooms
  /rooms/join:
    post:
      consumes:
      - application/json
      description: Joins any room using its invite code. Idempotent.
      parameters:
      - description: invite code
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.JoinByCodeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Room'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Join a room by invite code
      tags:
      - rooms
  /users/{id}:
    get:
      description: Public profile of any user by id, with achievements.
      parameters:
      - description: user id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.UserProfileResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a user profile
      tags:
      - users
securityDefinitions:
  BearerAuth:
    description: 'JWT from POST /auth/telegram: "Bearer <token>"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
